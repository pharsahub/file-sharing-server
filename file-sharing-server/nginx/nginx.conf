events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    # Allow large file uploads
    client_max_body_size 10G;

    upstream frontend {
        server client:80;
    }

    upstream backend {
        server api:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
        }

        # API Reverse Proxy
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
            
            # Disable buffering for streaming responses (like large file downloads)
            proxy_buffering off;
        }

        # WebSocket Reverse Proxy for Discovery
        location /discovery {
            proxy_pass http://backend/discovery;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Direct access to storage if wanted, or route through API.
        # Routing through API is better for auth/permissions.
    }
}
